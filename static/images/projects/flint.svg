<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16161e;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#ffffff08" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#ffffff08" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#ffffff08" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#ffffff08" stroke-width="1"/>

  <!-- Orange glow behind icon -->
  <ellipse cx="220" cy="225" rx="90" ry="90" fill="#f9731620" filter="url(#glow)"/>

  <!-- Mic / waveform icon -->
  <rect x="205" y="165" width="30" height="50" rx="15" fill="url(#accent)"/>
  <path d="M190 210 Q190 245 220 245 Q250 245 250 210" fill="none" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  <line x1="220" y1="245" x2="220" y2="265" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  <line x1="207" y1="265" x2="233" y2="265" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>

  <!-- AI response cards  right side -->
  <!-- Card 1 -->
  <rect x="310" y="100" width="440" height="68" rx="8" fill="url(#card1)" stroke="#f9731630" stroke-width="1"/>
  <rect x="322" y="115" width="4" height="38" rx="2" fill="#f97316"/>
  <text x="338" y="133" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#94a3b8">DIRECTIONAL</text>
  <text x="338" y="153" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#e2e8f0">Clarify trade-offs between approach A and B...</text>

  <!-- Card 2 -->
  <rect x="310" y="182" width="440" height="68" rx="8" fill="url(#card1)" stroke="#f9731620" stroke-width="1"/>
  <rect x="322" y="197" width="4" height="38" rx="2" fill="#fb923c"/>
  <text x="338" y="215" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#94a3b8">DEPTH</text>
  <text x="338" y="235" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#e2e8f0">Walk through your system design decision...</text>

  <!-- Card 3 -->
  <rect x="310" y="264" width="440" height="68" rx="8" fill="url(#card1)" stroke="#f9731215" stroke-width="1"/>
  <rect x="322" y="279" width="4" height="38" rx="2" fill="#fdba74"/>
  <text x="338" y="297" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#94a3b8">CLARIFYING</text>
  <text x="338" y="317" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#e2e8f0">Ask: what constraints shaped that choice?</text>

  <!-- Waveform bars (transcription animation) -->
  <rect x="130" y="195" width="6" height="16" rx="3" fill="#f9731660"/>
  <rect x="142" y="187" width="6" height="32" rx="3" fill="#f97316aa"/>
  <rect x="154" y="193" width="6" height="20" rx="3" fill="#f9731660"/>
  <rect x="166" y="184" width="6" height="38" rx="3" fill="#f97316"/>
  <rect x="178" y="191" width="6" height="24" rx="3" fill="#f9731680"/>

  <!-- Title + tagline -->
  <text x="400" y="370" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">Flint</text>
  <text x="400" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Real-time AI interview co-pilot · Rust · Tauri · Whisper · RAG</text>

  <!-- Stealth badge -->
  <rect x="316" y="348" width="168" height="22" rx="11" fill="#f9731618" stroke="#f9731640" stroke-width="1"/>
  <circle cx="330" cy="359" r="4" fill="#f97316"/>
  <text x="342" y="363" font-family="'SF Mono', monospace" font-size="10" fill="#f97316">stealth overlay</text>
  <rect x="496" y="348" width="148" height="22" rx="11" fill="#f9731618" stroke="#f9731440" stroke-width="1"/>
  <circle cx="510" cy="359" r="4" fill="#fb923c"/>
  <text x="522" y="363" font-family="'SF Mono', monospace" font-size="10" fill="#fb923c">local transcription</text>
</svg>
