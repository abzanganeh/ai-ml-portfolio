<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="progress" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#ffffff06" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#ffffff06" stroke-width="1"/>
  <line x1="267" y1="0" x2="267" y2="450" stroke="#ffffff06" stroke-width="1"/>
  <line x1="534" y1="0" x2="534" y2="450" stroke="#ffffff06" stroke-width="1"/>

  <!-- ---- Left panel: document / master resume ---- -->
  <rect x="40" y="80" width="200" height="260" rx="8" fill="url(#card)" stroke="#3b82f620" stroke-width="1"/>
  <!-- Doc header stripe -->
  <rect x="40" y="80" width="200" height="32" rx="8" fill="#1e3a5f"/>
  <rect x="40" y="100" width="200" height="12" fill="#1e3a5f"/>
  <text x="140" y="101" font-family="'SF Mono', monospace" font-size="10" fill="#93c5fd" text-anchor="middle">MASTER RESUME</text>
  <!-- Lines -->
  <rect x="58" y="128" width="90" height="7" rx="3" fill="#3b82f640"/>
  <rect x="58" y="143" width="140" height="6" rx="3" fill="#3b82f630"/>
  <rect x="58" y="157" width="120" height="6" rx="3" fill="#3b82f628"/>
  <rect x="58" y="175" width="80" height="7" rx="3" fill="#3b82f640"/>
  <rect x="58" y="190" width="145" height="6" rx="3" fill="#3b82f625"/>
  <rect x="58" y="204" width="130" height="6" rx="3" fill="#3b82f625"/>
  <rect x="58" y="222" width="70" height="7" rx="3" fill="#3b82f640"/>
  <rect x="58" y="237" width="135" height="6" rx="3" fill="#3b82f625"/>
  <rect x="58" y="251" width="115" height="6" rx="3" fill="#3b82f625"/>
  <rect x="58" y="269" width="90" height="7" rx="3" fill="#3b82f640"/>
  <rect x="58" y="284" width="150" height="6" rx="3" fill="#3b82f625"/>
  <rect x="58" y="298" width="105" height="6" rx="3" fill="#3b82f625"/>
  <!-- pgvector badge -->
  <rect x="58" y="316" width="74" height="16" rx="8" fill="#1d4ed820" stroke="#3b82f650" stroke-width="1"/>
  <text x="95" y="327" font-family="'SF Mono', monospace" font-size="9" fill="#93c5fd" text-anchor="middle">pgvector</text>

  <!-- ---- Center: agent pipeline ---- -->
  <!-- Phase boxes stacked vertically -->
  <!-- Phase 1 -->
  <rect x="282" y="78" width="236" height="44" rx="6" fill="url(#card)" stroke="#3b82f640" stroke-width="1"/>
  <circle cx="302" cy="100" r="10" fill="#1d4ed8"/>
  <text x="302" y="104" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle">1</text>
  <text x="322" y="97" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">JD Keyword Extraction</text>
  <text x="322" y="112" font-family="monospace" font-size="10" fill="#64748b">structured output · Pydantic</text>

  <!-- Arrow -->
  <line x1="400" y1="122" x2="400" y2="134" stroke="#3b82f660" stroke-width="2"/>
  <polygon points="394,132 400,142 406,132" fill="#3b82f660"/>

  <!-- Phase 2 -->
  <rect x="282" y="142" width="236" height="44" rx="6" fill="url(#card)" stroke="#6366f140" stroke-width="1"/>
  <circle cx="302" cy="164" r="10" fill="#4f46e5"/>
  <text x="302" y="168" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle">2</text>
  <text x="322" y="161" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">Gap Audit</text>
  <text x="322" y="176" font-family="monospace" font-size="10" fill="#64748b">RAG over resume chunks</text>

  <!-- Arrow -->
  <line x1="400" y1="186" x2="400" y2="198" stroke="#6366f160" stroke-width="2"/>
  <polygon points="394,196 400,206 406,196" fill="#6366f160"/>

  <!-- Phase 3 (active) -->
  <rect x="282" y="206" width="236" height="44" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="302" cy="228" r="10" fill="url(#accent)"/>
  <text x="302" y="232" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle">3</text>
  <text x="322" y="225" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff">Resume Rewrite</text>
  <text x="322" y="240" font-family="monospace" font-size="10" fill="#93c5fd">evidence-sourced · LangChain</text>

  <!-- Arrow -->
  <line x1="400" y1="250" x2="400" y2="262" stroke="#3b82f660" stroke-width="2"/>
  <polygon points="394,260 400,270 406,260" fill="#3b82f660"/>

  <!-- Phase 4 -->
  <rect x="282" y="270" width="236" height="44" rx="6" fill="url(#card)" stroke="#3b82f625" stroke-width="1"/>
  <circle cx="302" cy="292" r="10" fill="#1e40af"/>
  <text x="302" y="296" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle">4</text>
  <text x="322" y="289" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">QA Checklist</text>
  <text x="322" y="304" font-family="monospace" font-size="10" fill="#64748b">ATS-clean · export PDF/DOCX</text>

  <!-- ---- Right panel: output card ---- -->
  <rect x="556" y="80" width="204" height="260" rx="8" fill="url(#card)" stroke="#3b82f620" stroke-width="1"/>
  <rect x="556" y="80" width="204" height="32" rx="8" fill="#1e3a5f"/>
  <rect x="556" y="100" width="204" height="12" fill="#1e3a5f"/>
  <text x="658" y="101" font-family="'SF Mono', monospace" font-size="10" fill="#93c5fd" text-anchor="middle">TAILORED RESUME</text>
  <!-- Highlighted lines -->
  <rect x="572" y="128" width="88" height="7" rx="3" fill="#3b82f660"/>
  <rect x="572" y="143" width="156" height="6" rx="3" fill="#3b82f640"/>
  <rect x="572" y="157" width="136" height="6" rx="3" fill="#3b82f635"/>
  <!-- Progress bar -->
  <rect x="572" y="174" width="168" height="6" rx="3" fill="#1e3a5f"/>
  <rect x="572" y="174" width="140" height="6" rx="3" fill="url(#progress)"/>
  <text x="572" y="196" font-family="monospace" font-size="9" fill="#64748b">Job-fit score</text>
  <text x="736" y="196" font-family="monospace" font-size="9" fill="#3b82f6" text-anchor="end">87%</text>
  <rect x="572" y="208" width="156" height="6" rx="3" fill="#3b82f630"/>
  <rect x="572" y="222" width="130" height="6" rx="3" fill="#3b82f625"/>
  <rect x="572" y="240" width="78" height="7" rx="3" fill="#3b82f640"/>
  <rect x="572" y="255" width="162" height="6" rx="3" fill="#3b82f625"/>
  <rect x="572" y="269" width="118" height="6" rx="3" fill="#3b82f625"/>
  <!-- Download badge -->
  <rect x="572" y="293" width="52" height="16" rx="8" fill="#1d4ed820" stroke="#3b82f650" stroke-width="1"/>
  <text x="598" y="304" font-family="monospace" font-size="9" fill="#93c5fd" text-anchor="middle">PDF</text>
  <rect x="632" y="293" width="58" height="16" rx="8" fill="#1d4ed820" stroke="#3b82f450" stroke-width="1"/>
  <text x="661" y="304" font-family="monospace" font-size="9" fill="#93c5fd" text-anchor="middle">DOCX</text>

  <!-- Title + tagline -->
  <text x="400" y="370" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">Smart Resume Agent</text>
  <text x="400" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">AI-powered resume tailoring · FastAPI · Next.js · pgvector · LangChain</text>

  <!-- Voice badge -->
  <rect x="270" y="348" width="90" height="22" rx="11" fill="#1d4ed818" stroke="#3b82f640" stroke-width="1"/>
  <circle cx="284" cy="359" r="4" fill="#3b82f6"/>
  <text x="296" y="363" font-family="'SF Mono', monospace" font-size="10" fill="#3b82f6">voice</text>
  <rect x="370" y="348" width="60" height="22" rx="11" fill="#1d4ed818" stroke="#6366f140" stroke-width="1"/>
  <circle cx="384" cy="359" r="4" fill="#6366f1"/>
  <text x="396" y="363" font-family="'SF Mono', monospace" font-size="10" fill="#6366f1">RAG</text>
  <rect x="440" y="348" width="90" height="22" rx="11" fill="#1d4ed818" stroke="#3b82f430" stroke-width="1"/>
  <circle cx="454" cy="359" r="4" fill="#60a5fa"/>
  <text x="466" y="363" font-family="'SF Mono', monospace" font-size="10" fill="#60a5fa">BYOK</text>
</svg>
